<!DOCTYPE html>
<html>
<head>
<title>AI Resume Builder</title>
<style>

body{
font-family:Arial;
background:#6c3cff;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#6c3cff;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#6c3cff;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#4e2bbd;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Resume Builder</h1>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<textarea id="summary" placeholder="Professional Summary"></textarea>
<textarea id="experience" placeholder="Work Experience"></textarea>
<textarea id="skills" placeholder="Skills"></textarea>

<button onclick="generate()">Generate Resume</button>

</div>

<script>

function generate(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let phone=document.getElementById("phone").value
let summary=document.getElementById("summary").value
let exp=document.getElementById("experience").value
let skills=document.getElementById("skills").value

let win=window.open()

win.document.write(`
<h1>${name}</h1>
<p><b>Email:</b> ${email}</p>
<p><b>Phone:</b> ${phone}</p>

<h2>Summary</h2>
<p>${summary}</p>

<h2>Experience</h2>
<p>${exp}</p>

<h2>Skills</h2>
<p>${skills}</p>
`)

}

</script>

</body>
</html>
