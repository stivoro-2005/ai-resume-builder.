<!DOCTYPE html>
<html>

<head>

<title>AI Resume Builder PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a5af9,#9b5de5);
margin:0;
padding:0;
}

.container{
width:900px;
margin:auto;
padding:40px;
}

.form{
background:white;
padding:25px;
border-radius:12px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px;
margin-top:12px;
background:#6a5af9;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.preview{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
width:800px;
margin:auto;
}

.resume-header{
display:flex;
align-items:center;
border-bottom:2px solid #eee;
padding-bottom:20px;
margin-bottom:20px;
}

.profile-pic{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-right:20px;
}

.section{
margin-top:20px;
}

.skill-bar{
background:#eee;
border-radius:5px;
margin-top:5px;
}

.skill-fill{
height:8px;
background:#6a5af9;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<div class="form">

<h2>AI Resume Builder</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<input type="file" id="photo">

<textarea id="profile" placeholder="Professional Summary"></textarea>

<textarea id="experience" placeholder="Work Experience"></textarea>

<textarea id="education" placeholder="Education"></textarea>

<textarea id="skills" placeholder="Skills (comma separated)"></textarea>

<button onclick="generateSummary()">Generate AI Summary</button>

<button onclick="generateCV()">Generate Resume</button>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="preview" class="preview"></div>

</div>

<script>

window.onload=function(){
loadData()
generateCV()
}

function saveData(){

let data={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
location:document.getElementById("location").value,
profile:document.getElementById("profile").value,
experience:document.getElementById("experience").value,
education:document.getElementById("education").value,
skills:document.getElementById("skills").value
}

localStorage.setItem("cvData",JSON.stringify(data))

}

function loadData(){

let data=localStorage.getItem("cvData")

if(data){

data=JSON.parse(data)

document.getElementById("name").value=data.name
document.getElementById("email").value=data.email
document.getElementById("phone").value=data.phone
document.getElementById("location").value=data.location
document.getElementById("profile").value=data.profile
document.getElementById("experience").value=data.experience
document.getElementById("education").value=data.education
document.getElementById("skills").value=data.skills

}

}

function generateSummary(){

let skills=document.getElementById("skills").value

let summary="Results-driven professional with experience in "+skills+". Strong ability to collaborate with teams, solve problems, and deliver high-quality results in fast-paced environments."

document.getElementById("profile").value=summary

generateCV()

}

function generateCV(){

saveData()

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let phone=document.getElementById("phone").value
let location=document.getElementById("location").value

let profile=document.getElementById("profile").value
let experience=document.getElementById("experience").value
let education=document.getElementById("education").value

let skills=document.getElementById("skills").value.split(",")

let photoInput=document.getElementById("photo")

let photoURL=""

if(photoInput.files[0]){
photoURL=URL.createObjectURL(photoInput.files[0])
}

let skillsHTML=""

skills.forEach(skill=>{

skillsHTML+=`

<p>${skill}</p>

<div class="skill-bar">

<div class="skill-fill" style="width:${Math.floor(Math.random()*80+20)}%"></div>

</div>

`

})

let html=`

<div>

<div class="resume-header">

<img src="${photoURL}" class="profile-pic">

<div>

<h1>${name}</h1>

<p>${email} | ${phone} | ${location}</p>

</div>

</div>

<div class="section">

<h3>Professional Summary</h3>

<p>${profile}</p>

</div>

<div class="section">

<h3>Work Experience</h3>

<p>${experience}</p>

</div>

<div class="section">

<h3>Education</h3>

<p>${education}</p>

</div>

<div class="section">

<h3>Skills</h3>

${skillsHTML}

</div>

</div>

`

document.getElementById("preview").innerHTML=html

}

function downloadPDF(){

let element=document.getElementById("preview")

html2canvas(element).then(canvas=>{

let img=canvas.toDataURL("image/png")

const {jsPDF}=window.jspdf

let pdf=new jsPDF("p","mm","a4")

pdf.addImage(img,"PNG",10,10,190,0)

pdf.save("resume.pdf")

})

}

</script>

</body>

</html>
